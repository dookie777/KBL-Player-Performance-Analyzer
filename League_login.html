<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KBL Player Performance Analyzer — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000; overflow: hidden; height: 100vh; width: 100vw;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-family: 'Noto Sans KR', sans-serif; position: relative;
    }
    #bg-canvas { position: absolute; inset: 0; z-index: 0; }

    .center {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 360px; padding: 0 20px;
    }
    /* 타이틀 */
    .brand {
      text-align: center; opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
    }
    .brand .t1 {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.1rem; letter-spacing: 3px;
      color: #fff; line-height: 1.05;
      text-shadow: 0 0 32px rgba(255,255,255,0.12);
    }
    .brand .t1 .accent { color: #e2e8f0; }
    .brand .sub {
      margin-top: 10px; font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem; letter-spacing: 6px; color: rgba(255,255,255,0.4);
    }
    /* 구분선 */
    .divider {
      width: 0; height: 1px; margin: 26px 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
      animation: lineGrow 0.6s ease 0.9s forwards;
    }
    /* 입력 폼 */
    .form {
      width: 100%; opacity: 0;
      animation: fadeUp 0.7s ease 1.1s forwards;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem; letter-spacing: 3px; color: rgba(255,255,255,0.45); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 14px; font-size: 14px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 2px; color: #fff; outline: none; transition: all 0.2s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus {
      border-color: rgba(255,255,255,0.6);
      box-shadow: 0 0 18px rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    /* 로그인 버튼 (ENTER 톤) */
    .btn-login {
      width: 100%; margin-top: 10px; padding: 13px 0; cursor: pointer;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 8px;
      color: #fff; background: transparent; border: 1px solid rgba(255,255,255,0.5);
      border-radius: 2px; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .btn-login:hover {
      border-color: rgba(255,255,255,0.85); letter-spacing: 10px;
      background: rgba(255,255,255,0.1);
    }
    .btn-login:disabled { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.4); cursor: not-allowed; letter-spacing: 8px; background: transparent; }
    .msg { margin-top: 16px; min-height: 18px; font-size: 13px; text-align: center; color: #cbd5e1; letter-spacing: 0.5px; }
    /* 하단 */
    .footer-text {
      position: absolute; bottom: 28px; z-index: 2;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.72rem; letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
      opacity: 0; animation: fadeUp 0.6s ease 1.6s forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes lineGrow { to { width: 100%; } }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="center">
    <div class="brand">
      <div class="t1">KBL PLAYER<br><span class="accent">PERFORMANCE</span> ANALYZER</div>
      <div class="sub">LEAGUE EDITION</div>
    </div>
    <div class="divider"></div>
    <div class="form">
      <div class="field">
        <label for="loginId">ID</label>
        <input type="text" id="loginId" autocomplete="username" placeholder="구단 아이디">
      </div>
      <div class="field">
        <label for="loginPw">PASSWORD</label>
        <input type="password" id="loginPw" autocomplete="current-password" placeholder="비밀번호">
      </div>
      <button class="btn-login" id="btnLogin">LOGIN</button>
      <div class="msg" id="loginMsg"></div>
    </div>
  </div>

  <div class="footer-text">© 2026 THE EROOM SPORTS · KBL ANALYTICS</div>

  <script>
    // ── 파티클 배경 (인트로 동일 톤) ──
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    function randBetween(a, b) { return a + Math.random() * (b - a); }
    for (let i = 0; i < 80; i++) {
      const isOrange = Math.random() > 0.3;
      particles.push({
        x: randBetween(0, window.innerWidth), y: randBetween(0, window.innerHeight),
        r: randBetween(0.5, 2.5), vx: randBetween(-0.3, 0.3), vy: randBetween(-0.5, -0.1),
        alpha: randBetween(0.1, 0.6),
        color: isOrange
          ? `rgba(${Math.floor(randBetween(150,210))}, ${Math.floor(randBetween(150,210))}, ${Math.floor(randBetween(160,220))}, `
          : `rgba(255, 255, 255, `,
      });
    }
    function drawBg() {
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createRadialGradient(W/2, H/2, H*0.1, W/2, H/2, H*0.9);
      grad.addColorStop(0, 'rgba(20,5,0,0.0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.85)');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.y < -5) { p.y = H + 5; p.x = randBetween(0, W); }
        if (p.x < -5) p.x = W + 5;
        if (p.x > W + 5) p.x = -5;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + p.alpha + ')'; ctx.fill();
      });
      requestAnimationFrame(drawBg);
    }
    drawBg();

    // ── 로그인 로직 ──
    var idEl = document.getElementById('loginId');
    var pwEl = document.getElementById('loginPw');
    var btn  = document.getElementById('btnLogin');
    var msg  = document.getElementById('loginMsg');

    (function () {
      var t = localStorage.getItem('kbl_token');
      if (!t) return;
      fetch('/api/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token: t }) })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && d.ok) location.replace('league.html'); })
        .catch(function(){});
    })();

    function doLogin() {
      var id = idEl.value.trim(), pw = pwEl.value;
      if (!id || !pw) { msg.style.color = '#cbd5e1'; msg.textContent = '아이디와 비밀번호를 입력하십시오.'; return; }
      btn.disabled = true; msg.style.color = 'rgba(255,255,255,0.5)'; msg.textContent = '확인 중...';
      fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: id, pw: pw }) })
        .then(function(r){ return r.json().then(function(d){ return { status:r.status, d:d }; }); })
        .then(function(res){
          if (res.d && res.d.ok) {
            localStorage.setItem('kbl_token', res.d.token);
            localStorage.setItem('kbl_team', res.d.team || '');
            location.replace('league.html');
          } else {
            msg.style.color = '#cbd5e1';
            msg.textContent = (res.d && res.d.error) || '로그인에 실패했습니다.';
            btn.disabled = false;
          }
        }).catch(function(){
          msg.style.color = '#cbd5e1'; msg.textContent = '서버 연결에 실패했습니다.'; btn.disabled = false;
        });
    }
    btn.addEventListener('click', doLogin);
    pwEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') doLogin(); });
    idEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') pwEl.focus(); });
  </script>
</body>
</html>
